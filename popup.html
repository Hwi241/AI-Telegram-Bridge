<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>AI ↔ Telegram Bridge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 240px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e; color: #e0e0e0; padding: 16px;
    }
    h2 { font-size: 13px; color: #a78bfa; text-align: center; margin-bottom: 14px; }
    .badges { text-align: center; margin-bottom: 14px; }
    .badge {
      display: inline-block; background: #222244;
      border: 1px solid #333366; border-radius: 6px;
      padding: 3px 8px; font-size: 10px; margin: 2px; color: #8888cc;
    }
    .label { font-size: 10px; color: #555577; margin-bottom: 6px; font-weight: 600; }
    .step { font-size: 10px; color: #888; margin-bottom: 4px; line-height: 1.5; }
    .step b { color: #a78bfa; }
    .divider { height: 1px; background: #222240; margin: 12px 0; }
    .note { font-size: 9px; color: #444466; text-align: center; line-height: 1.4; }
  </style>
</head>
<body>
  <h2>🔗 AI ↔ Telegram Bridge</h2>
  <div class="badges">
    <span class="badge">Claude</span>
    <span class="badge">ChatGPT</span>
    <span class="badge">Gemini</span>
  </div>
  <div class="label">사용법</div>
  <div class="step">1. <b>web.telegram.org</b> 탭 열기</div>
  <div class="step">2. 봇 채팅방 선택</div>
  <div class="step">3. AI 사이트의 플로팅 패널 이용</div>
  <div class="divider"></div>
  <div class="step">📤 → Telegram: AI 응답을 봇으로 전송</div>
  <div class="step">📥 → AI: 봇 메시지를 AI 입력창에 붙여넣기</div>
  <div class="divider"></div>
  <div class="note">플로팅 패널이 안 보이면 페이지를 새로고침하세요</div>
</body>
</html>
